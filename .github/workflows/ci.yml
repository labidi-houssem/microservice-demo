name: Build, Push and Update GitOps

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/deployment.yaml"

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tag
        id: meta
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }} \
            -t ghcr.io/${{ github.repository }}:latest \
            ./app

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Update Kubernetes deployment
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.TAG }}|" k8s/deployment.yaml

      - name: Commit updated deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ci: update image to ${{ steps.meta.outputs.TAG }}"
          git push