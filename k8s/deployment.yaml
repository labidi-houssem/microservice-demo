apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-demo
  labels:
    app: microservice-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: microservice-demo
  template:
    metadata:
      labels:
        app: microservice-demo
    spec:
      containers:
        - name: microservice-demo
          image: ghcr.io/labidi-houssem/microservice-demo:3d01917
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: proxmox-credentials
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
